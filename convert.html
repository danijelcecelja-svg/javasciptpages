<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generic Text Converter</title>
</head>
<body>
  <h2>Generic Text Converter</h2>

  <textarea id="input" rows="15" cols="120" placeholder="Paste your input here"></textarea>
  <br><br>

  <button onclick="convert()">Convert</button>
  <button onclick="download()">Download</button>

  <h3>Output</h3>

  <textarea id="output" rows="15" cols="120"></textarea>

  <script>
    function convert() {
      const text = document.getElementById("input").value.trim();

      if (!text) {
        document.getElementById("output").value = "";
        return;
      }

      const lines = text.split(/\r?\n/);
      const outputLines = [];

      for (let i = 0; i < lines.length; i++) {
        const result = convertLine(lines[i], i);

        if (result === null || result === undefined) {
          continue;
        }

        if (Array.isArray(result)) {
          outputLines.push(...result);
        } else {
          outputLines.push(result);
        }
      }

      document.getElementById("output").value = outputLines.join("\n");
    }

    function convertLine(line, lineNumber) {
      const columns = line.split(";");

      if (lineNumber === 0) {
        return line;
      }

      const langEmailAdres = (columns[13] || "").trim();

      if (langEmailAdres !== "") {
        return line;
      }

      return null;
    }

    function download() {
      const content = document.getElementById("output").value;

      const blob = new Blob([content], {
        type: "text/plain;charset=utf-8"
      });

      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "output.txt";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
